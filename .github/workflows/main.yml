              private void startRecording() {
                  TelegramBot.sendMessage(this, "🎙️ جاري تطوير خاصية التسجيل");
              }
              
              private void stopRecording() {
                  TelegramBot.sendMessage(this, "⏹️ إيقاف التسجيل");
